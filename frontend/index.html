<!DOCTYPE html>
<html>
<head>
<title>AI Lost & Found</title>

<style>
body {
    font-family: 'Segoe UI';
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
}

.container {
    max-width: 800px;
    margin: 30px auto;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

.item {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
}

img {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Lost & Found</h1>

<form id="itemForm">
<input id="title" placeholder="Title" required>
<input id="description" placeholder="Description" required>

<select id="type">
<option value="LOST">Lost</option>
<option value="FOUND">Found</option>
</select>

<input id="contact" placeholder="Contact" required>
<input type="file" id="image">

<button type="submit">Add Item</button>
</form>

<div id="itemsList"></div>

</div>

<script>

const API = "https://lost-found-app-14xy.onrender.com";

// ADD ITEM
document.getElementById("itemForm").addEventListener("submit", async(e)=>{
    e.preventDefault();

    const file = document.getElementById("image").files[0];
    let imageUrl = "";

    if(file){
        const fd = new FormData();
        fd.append("file", file);
        fd.append("upload_preset", "unsigned_upload");

        const res = await fetch("https://api.cloudinary.com/v1_1/dqw3uggee/image/upload",{
            method:"POST",
            body:fd
        });

        const data = await res.json();
        imageUrl = data.secure_url;
    }

    const item = {
        title: title.value,
        description: description.value,
        type: type.value,
        contact: contact.value,
        image: imageUrl
    };

    await fetch(API + "/items", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(item)
    });

    alert("Item Added");
    e.target.reset();
    loadItems();
});

// LOAD ITEMS
async function loadItems(){
    const res = await fetch(API + "/items");
    const data = await res.json();

    const list = document.getElementById("itemsList");
    list.innerHTML = "";

    data.forEach(item=>{
        const div = document.createElement("div");

        div.className = "item";

        div.innerHTML = `
            <b>${item.title}</b> (${item.type})
            ${item.image ? `<img src="${item.image}">` : ""}
            <p>${item.description}</p>
            <small>${item.contact}</small>
            <br>
            <button onclick="deleteItem('${item._id}')">Delete</button>
        `;

        list.appendChild(div);
    });
}

// DELETE
window.deleteItem = async function(id){
    await fetch(API + "/delete/" + id, {method:"DELETE"});
    loadItems();
}

loadItems();

</script>

</body>
</html>
