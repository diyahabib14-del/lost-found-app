<!DOCTYPE html>
<html>
<head>
<title>AI Lost & Found</title>

<style>
body {
    font-family: 'Segoe UI';
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
}

/* LOGIN PAGE */
#loginPage {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#1e1e3f;
}

.login-box {
    background:#2a2a5a;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

/* MAIN APP */
.container {
    max-width: 800px;
    margin: 30px auto;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

.item {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
}

img {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN PAGE -->
<div id="loginPage">
    <div class="login-box">
        <h2>🔐 Login</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- 🚀 MAIN APP -->
<div id="mainApp" style="display:none;">

<div class="container">

<div style="margin-top:20px;">
    <button onclick="logout()" style="background:rgb(49, 125, 207);">Logout</button>
</div>

<h1>Lost & Found</h1>

<form id="itemForm">
<input id="title" placeholder="Title" required>
<input id="description" placeholder="Description" required>

<select id="type">
<option value="LOST">Lost</option>
<option value="FOUND">Found</option>
</select>

<input id="contact" placeholder="Contact" required>
<input type="file" id="image">

<button type="submit">Add Item</button>
</form>

<div id="itemsList"></div>

</div>
</div>

<script>

const API = "https://lost-found-app-14xy.onrender.com";

/* 🔐 LOGIN */
function login(){
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    if(u && p){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("mainApp").style.display="block";
    } else {
        alert("Enter username & password");
    }
}

/* 🔐 LOGOUT */
function logout(){
    document.getElementById("loginPage").style.display="flex";
    document.getElementById("mainApp").style.display="none";
}

// ADD ITEM
document.getElementById("itemForm").addEventListener("submit", async(e)=>{
    e.preventDefault();

    const file = document.getElementById("image").files[0];
    let imageUrl = "";

    if(file){
        const fd = new FormData();
        fd.append("file", file);
        fd.append("upload_preset", "vwc2caen"); // ✅ your correct preset

        const res = await fetch("https://api.cloudinary.com/v1_1/dqw3uggee/image/upload",{
            method:"POST",
            body:fd
        });

        const data = await res.json();
        imageUrl = data.secure_url;
    }

    const item = {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        type: document.getElementById("type").value,
        contact: document.getElementById("contact").value,
        image: imageUrl
    };

    await fetch(API + "/items", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(item)
    });

    alert("Item Added");
    e.target.reset();
    loadItems();
});

// LOAD ITEMS
async function loadItems(){
    const res = await fetch(API + "/items");
    const data = await res.json();

    const list = document.getElementById("itemsList");
    list.innerHTML = "";

    data.forEach(item=>{
        const div = document.createElement("div");

        div.className = "item";

        div.innerHTML = `
            <b>${item.title}</b> (${item.type})
            ${item.image ? `<img src="${item.image}">` : ""}
            <p>${item.description}</p>
            <small>${item.contact}</small>
            <br>
            <button onclick="deleteItem('${item._id}')">Delete</button>
        `;

        list.appendChild(div);
    });
}

// DELETE
window.deleteItem = async function(id){
    await fetch(API + "/delete/" + id, {method:"DELETE"});
    loadItems();
}

loadItems();

</script>

</body>
</html>
